<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
    
    {% seo %}
</head>
<body>
    <!-- Navigation -->
    {% include custom-nav.html %}

    <!-- Main Content -->
    {{ content }}

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site.time | date: "%Y" }} Shivraj Shere. Designed & Built in the UK.</p>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{{ '/assets/js/custom.js' | relative_url }}"></script>
</body>
</html>
